<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logic Pro | Login</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --text: #f8fafc; --accent: #fbbf24; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 340px; border: 1px solid #334155; text-align: center; }
        .tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid #334155; }
        .tab { flex: 1; padding: 10px; cursor: pointer; color: #64748b; font-weight: bold; }
        .tab.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; margin-bottom: 15px; box-sizing: border-box; }
        .btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; }
        #msg { margin-top: 15px; font-size: 0.8rem; color: var(--accent); display: none; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2 style="color:var(--primary)">LOGIC<span style="color:var(--accent)">PRO</span></h2>
        <div class="tabs">
            <div id="tL" class="tab active" onclick="setMode('login')">LOGIN</div>
            <div id="tR" class="tab" onclick="setMode('reg')">REGISTER</div>
        </div>
        <input type="text" id="user" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button class="btn" onclick="handleAuth()">ENTER SYSTEM</button>
        <div id="msg"></div>
    </div>
    <script>
        let mode = 'login';
        function setMode(m) {
            mode = m;
            document.getElementById('tL').classList.toggle('active', m==='login');
            document.getElementById('tR').classList.toggle('active', m==='reg');
        }
        function handleAuth() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            msg.style.display = 'block';

            if(mode === 'reg') {
                msg.innerText = "Registration Sent! Wait for Admin Approval.";
            } else {
                if(u === 'admin' && p === '1234') {
                    window.location.href = 'admin.html';
                } else if (u && p) {
                    msg.innerText = "Checking Approval Status...";
                    setTimeout(() => { msg.innerText = "Error: Account not approved yet."; }, 1500);
                }
            }
        }
    </script>
</body>
</html>
