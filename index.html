<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Logic Admin Console</title>
    <style>
        :root { --admin-red: #ef4444; --admin-green: #10b981; --dark: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--dark); color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; }
        .panel { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        
        /* User Management */
        .user-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 10px; }
        .approved { background: var(--admin-green); }
        .pending { background: #f59e0b; }

        /* Settle Controls */
        .timer-lock { font-size: 2rem; text-align: center; color: #fbbf24; margin: 20px 0; }
        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .btn-settle { padding: 20px; border: none; border-radius: 8px; font-weight: bold; cursor: not-allowed; opacity: 0.3; }
        .btn-active { cursor: pointer !important; opacity: 1 !important; background: #3b82f6; color: white; }
    </style>
</head>
<body>

<h1>Admin Control Center</h1>

<div class="grid">
    <div class="panel">
        <h3>User Approval Queue</h3>
        <div id="userList">
            <div class="user-row">
                <span>Player_01</span>
                <button onclick="approveUser(this)" class="status-badge pending">Approve</button>
            </div>
            <div class="user-row">
                <span>Player_02</span>
                <span class="status-badge approved">Approved</span>
            </div>
        </div>
    </div>

    <div class="panel">
        <h3>Live Round Control</h3>
        <div id="activeBetsList">
            <p style="color: #64748b;">Waiting for player bets...</p>
        </div>
        
        <hr style="border-color: #334155; margin: 20px 0;">
        
        <div class="timer-lock" id="adminTimer">10:00</div>
        
        <div class="btn-grid">
            <button class="btn-settle" id="s1" onclick="submitResult(1)">Result 1</button>
            <button class="btn-settle" id="s2" onclick="submitResult(2)">Result 2</button>
            <button class="btn-settle" id="s3" onclick="submitResult(3)">Result 3</button>
            <button class="btn-settle" id="s4" onclick="submitResult(4)">Result 4</button>
        </div>
        <p id="lockMessage" style="text-align:center; color: #ef4444; margin-top: 10px;">Buttons Locked until timer ends.</p>
    </div>
</div>

<script>
    let timeLeft = 600; // 10 minutes
    let canSettle = false;

    // Simulate the 10 minute lock
    const countdown = setInterval(() => {
        if (timeLeft <= 0) {
            clearInterval(countdown);
            unlockButtons();
        } else {
            timeLeft--;
            let m = Math.floor(timeLeft / 60);
            let s = timeLeft % 60;
            document.getElementById('adminTimer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    }, 1000);

    function unlockButtons() {
        canSettle = true;
        document.getElementById('lockMessage').style.display = 'none';
        document.querySelectorAll('.btn-settle').forEach(btn => btn.classList.add('btn-active'));
    }

    function approveUser(btn) {
        btn.className = "status-badge approved";
        btn.innerText = "Approved";
        btn.onclick = null;
    }

    function submitResult(num) {
        if(!canSettle) return alert("System is locked for 10 minutes!");
        alert("Result " + num + " submitted. Payouts calculating for all users...");
        // This is where we would trigger the calculation for ALL users in the database
    }
</script>

</body>
</html>
