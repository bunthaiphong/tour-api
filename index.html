<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Logic Master v3</title>
    <style>
        :root { --bg: #020617; --card: #1e293b; --primary: #3b82f6; --text: #f8fafc; --accent: #fbbf24; --win: #10b981; --lose: #ef4444; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding: 15px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 420px; }
        .wallet-section { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 30px 20px; border-radius: 24px; text-align: center; margin-bottom: 20px; border: 1px solid #334155; }
        #balance { font-size: 3.5rem; font-weight: 900; color: var(--accent); margin: 0; }
        .card { background: var(--card); padding: 22px; border-radius: 20px; margin-bottom: 18px; border: 1px solid #334155; }
        .label { font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; display: block; }
        input { width: 100%; padding: 16px; background: #0f172a; border: 1px solid #475569; border-radius: 12px; color: white; box-sizing: border-box; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .btn-primary { width: 100%; padding: 18px; background: var(--primary); border: none; border-radius: 14px; color: white; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
        .admin-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .res-btn { padding: 22px; background: #334155; border: 1px solid #475569; border-radius: 14px; color: white; font-size: 1.5rem; font-weight: 900; }
        #timer-box { font-size: 4.5rem; font-weight: 900; color: var(--accent); text-align: center; margin: 15px 0; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        th { text-align: left; color: #64748b; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        td { padding: 12px 0; border-bottom: 1px solid #1e293b; }
        .win { color: var(--win); font-weight: bold; }
        .lose { color: var(--lose); font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="wallet-section">
        <span class="label">Total Wallet</span>
        <div id="balance">1,000.00</div>
    </div>

    <div id="bet-area" class="card">
        <label class="label">Method (K1, C1, T1, 1>2, -123)</label>
        <input type="text" id="mCode" placeholder="Enter Code" style="text-transform: uppercase;">
        <label class="label">Amount (Luy)</label>
        <input type="number" id="mLuy" placeholder="0.00">
        <button class="btn-primary" onclick="startRound()">START ROUND</button>
    </div>

    <div id="timer-area" class="card hidden">
        <div id="timer-box">10:00</div>
    </div>

    <div class="card">
        <span class="label">Set Result</span>
        <div class="admin-grid">
            <button class="res-btn" onclick="settle(1)">1</button>
            <button class="res-btn" onclick="settle(2)">2</button>
            <button class="res-btn" onclick="settle(3)">3</button>
            <button class="res-btn" onclick="settle(4)">4</button>
        </div>
    </div>

    <div class="card">
        <span class="label">History</span>
        <table>
            <thead><tr><th>Code</th><th>Bet</th><th>Net</th></tr></thead>
            <tbody id="logs"></tbody>
        </table>
    </div>
</div>

<script>
    let wallet = 1000.00;
    let currentBet = null;

    function startRound() {
        const m = document.getElementById('mCode').value.toUpperCase().trim();
        const l = parseFloat(document.getElementById('mLuy').value);
        if(!m || isNaN(l) || l > wallet) return alert("Check Input or Balance");
        
        wallet -= l;
        updateUI();
        currentBet = { method: m, luy: l };
        document.getElementById('bet-area').classList.add('hidden');
        document.getElementById('timer-area').classList.remove('hidden');
        runClock(600);
    }

    function runClock(s) {
        const box = document.getElementById('timer-box');
        let t = s;
        const timer = setInterval(() => {
            let m = Math.floor(t / 60); let secs = t % 60;
            box.innerText = `${m}:${secs < 10 ? '0' : ''}${secs}`;
            if (--t < 0) { clearInterval(timer); box.innerText = "READY"; }
        }, 1000);
    }

    function settle(res) {
        if(!currentBet) return alert("No bet");
        const profit = calculateAA(res, currentBet.method, currentBet.luy);
        if (profit > 0) wallet += (currentBet.luy + profit);
        else if (profit === 0) wallet += currentBet.luy;
        updateUI();
        addLog(currentBet.method, currentBet.luy, profit);
        currentBet = null;
        document.getElementById('bet-area').classList.remove('hidden');
        document.getElementById('timer-area').classList.add('hidden');
    }

    function updateUI() { document.getElementById('balance').innerText = wallet.toLocaleString(undefined,{minimumFractionDigits:2}); }
    
    function addLog(m, l, p) {
        const row = `<tr><td>${m}</td><td>${l}</td><td class="${p>0?'win':(p<0?'lose':'')}">${p>0?'+':''}${p.toFixed(2)}</td></tr>`;
        document.getElementById('logs').insertAdjacentHTML('afterbegin', row);
    }

    function calculateAA(Result, M, Luy) {
        // Translation Logic
        if (M.startsWith('K')) { // K1, K2... (Positive 1, 2...)
            let n = parseInt(M.substring(1));
            return Result === n ? Luy * 2.85 : -Luy;
        }
        if (M.startsWith('C')) { // C1, C2... (Negative -1, -2...)
            let n = parseInt(M.substring(1));
            return Result === n ? -Luy * 3 : Luy * 0.95;
        }
        if (M.startsWith('T')) { // T1, T2... (11, 22...)
            let n = parseInt(M.substring(1));
            if (n === 1) return Result === 1 ? Luy * 0.95 : (Result === 3 ? -Luy : 0);
            if (n === 2) return Result === 2 ? Luy * 0.95 : (Result === 4 ? -Luy : 0);
            if (n === 3) return Result === 3 ? Luy * 0.95 : (Result === 1 ? -Luy : 0);
            if (n === 4) return Result === 4 ? Luy * 0.95 : (Result === 2 ? -Luy : 0);
        }
        if (M.includes('>')) { // 1>2, 2>3...
            let parts = M.split('>');
            let d1 = parseInt(parts[0]), d2 = parseInt(parts[1]);
            return Result === d1 ? Luy * 1.9 : (Result === d2 ? 0 : -Luy);
        }
        if (M.startsWith('-') && M.length > 2) { // -123 (Negative Triples)
            let s = M.substring(1);
            if (Result == s[0]) return -Luy;
            if (Result == s[1] || Result == s[2]) return (Luy/2)*0.95;
            return 0;
        }
        // Handle Pairs (e.g. 12 or -12)
        let isNeg = M.startsWith('-');
        let val = isNeg ? Math.abs(parseInt(M)) : parseInt(M);
        if (val >= 10 && val <= 99) {
            let d1 = Math.floor(val/10), d2 = val%10;
            if (isNeg) return Result === d1 ? -Luy : (Result === d2 ? Luy*0.95 : 0);
            return (Result === d1 || Result === d2) ? Luy*0.95 : -Luy;
        }
        return 0;
    }
</script>
</body>
</html>
